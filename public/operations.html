<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BNA Operations</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Header */
        .header {
            background: #1e293b;
            border-bottom: 1px solid #334155;
            padding: 16px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            font-size: 20px;
            font-weight: 700;
            color: #f8fafc;
        }
        
        .header p {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 2px;
        }
        
        .header-actions {
            display: flex;
            gap: 12px;
        }
        
        .btn {
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .btn-primary {
            background: #c9a227;
            color: #0f172a;
        }
        
        .btn-primary:hover {
            background: #d4b43a;
        }
        
        .btn-secondary {
            background: #334155;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #475569;
        }
        
        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }
        
        /* Navigation Tabs */
        .nav-tabs {
            background: #1e293b;
            border-bottom: 1px solid #334155;
            padding: 0 24px;
        }
        
        .nav-tabs-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            gap: 4px;
        }
        
        .nav-tab {
            padding: 12px 20px;
            font-size: 13px;
            font-weight: 600;
            color: #94a3b8;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .nav-tab:hover {
            color: #e2e8f0;
        }
        
        .nav-tab.active {
            color: #c9a227;
            border-bottom-color: #c9a227;
        }
        
        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }
        
        /* Pipeline Board */
        .pipeline-board {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 16px;
            overflow-x: auto;
            padding-bottom: 20px;
        }
        
        .pipeline-column {
            background: #1e293b;
            border-radius: 12px;
            min-width: 200px;
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 200px);
        }
        
        .column-header {
            padding: 16px;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .column-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .column-count {
            background: #334155;
            color: #94a3b8;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
        }
        
        .column-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        /* Task Cards */
        .task-card {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .task-card:hover {
            border-color: #c9a227;
            transform: translateY(-2px);
        }
        
        .task-card.dragging {
            opacity: 0.5;
        }
        
        .task-title {
            font-size: 13px;
            font-weight: 600;
            color: #f8fafc;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        
        .task-meta {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        
        .badge {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .badge-category-admin { background: #7c3aed; color: white; }
        .badge-category-marketing { background: #2563eb; color: white; }
        .badge-category-parent_coaching { background: #059669; color: white; }
        .badge-category-student_operations { background: #d97706; color: white; }
        .badge-category-finance { background: #dc2626; color: white; }
        .badge-category-legal { background: #7c2d12; color: white; }
        .badge-category-accountability { background: #c9a227; color: #0f172a; }
        
        .badge-urgency-urgent { background: #fef2f2; color: #dc2626; }
        .badge-urgency-today { background: #fffbeb; color: #d97706; }
        .badge-urgency-this_week { background: #eff6ff; color: #2563eb; }
        .badge-urgency-low { background: #f1f5f9; color: #64748b; }
        
        .badge-energy-high { background: #fecaca; color: #991b1b; }
        .badge-energy-medium { background: #fde68a; color: #92400e; }
        .badge-energy-low { background: #bbf7d0; color: #166534; }
        
        .task-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: #64748b;
        }
        
        .task-source {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        /* Signups & Billing Views */
        .data-table {
            background: #1e293b;
            border-radius: 12px;
            overflow: hidden;
        }
        
        .table-header {
            display: grid;
            grid-template-columns: 2fr 1.5fr 1fr 1fr 1fr 100px;
            padding: 16px 20px;
            background: #0f172a;
            border-bottom: 1px solid #334155;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #94a3b8;
        }
        
        .table-row {
            display: grid;
            grid-template-columns: 2fr 1.5fr 1fr 1fr 1fr 100px;
            padding: 16px 20px;
            border-bottom: 1px solid #334155;
            align-items: center;
            font-size: 13px;
        }
        
        .table-row:hover {
            background: #252f47;
        }
        
        .table-row:last-child {
            border-bottom: none;
        }
        
        .parent-name {
            font-weight: 600;
            color: #f8fafc;
        }
        
        .student-name {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 2px;
        }
        
        .tag-list {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }
        
        .tag {
            padding: 2px 6px;
            background: #334155;
            border-radius: 4px;
            font-size: 10px;
            color: #cbd5e1;
        }
        
        .tag.parent { background: #1e40af; }
        .tag.student { background: #065f46; }
        .tag.cash { background: #92400e; }
        
        /* Payment Status */
        .payment-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .payment-status.paid {
            background: #065f46;
            color: #86efac;
        }
        
        .payment-status.pending {
            background: #92400e;
            color: #fcd34d;
        }
        
        .payment-status.partial {
            background: #1e40af;
            color: #93c5fd;
        }
        
        /* Quick Add Ramble */
        .ramble-box {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }
        
        .ramble-input {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 14px;
            color: #e2e8f0;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            min-height: 80px;
        }
        
        .ramble-input:focus {
            outline: none;
            border-color: #c9a227;
        }
        
        .ramble-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
        }
        
        .ramble-hint {
            font-size: 12px;
            color: #64748b;
        }

        .accountability-grid {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
        }

        .accountability-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 18px;
        }

        .student-card,
        .event-card {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .event-type {
            color: #c9a227;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .event-title {
            margin-top: 4px;
            color: #f8fafc;
            font-weight: 600;
        }

        .event-meta {
            margin-top: 6px;
            color: #94a3b8;
            font-size: 12px;
        }
        
        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .modal-overlay.show {
            display: flex;
        }
        
        .modal {
            background: #1e293b;
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow: auto;
        }
        
        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-header h2 {
            font-size: 18px;
            font-weight: 700;
            color: #f8fafc;
        }
        
        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            color: #94a3b8;
            cursor: pointer;
        }
        
        .modal-body {
            padding: 24px;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 10px 14px;
            color: #e2e8f0;
            font-size: 14px;
            font-family: inherit;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #c9a227;
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        .option-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .option-btn {
            flex: 1;
            min-width: 80px;
            padding: 10px;
            border: 1px solid #334155;
            border-radius: 8px;
            background: #0f172a;
            font-size: 13px;
            font-weight: 500;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .option-btn:hover {
            border-color: #c9a227;
        }
        
        .option-btn.active {
            border-color: #c9a227;
            background: rgba(201, 162, 39, 0.1);
            color: #c9a227;
            font-weight: 600;
        }
        
        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid #334155;
            display: flex;
            gap: 12px;
        }
        
        .modal-footer .btn {
            flex: 1;
        }
        
        /* Loading */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #94a3b8;
        }

        .error-banner {
            background: #451a1a;
            border: 1px solid #7f1d1d;
            color: #fecaca;
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom: 18px;
            font-size: 13px;
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }
        
        /* Responsive */
        @media (max-width: 1200px) {
            .pipeline-board {
                grid-template-columns: repeat(4, 1fr);
            }
        }
        
        @media (max-width: 768px) {
            .accountability-grid {
                grid-template-columns: 1fr;
            }

            .pipeline-board {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .table-header,
            .table-row {
                grid-template-columns: 1fr;
                gap: 8px;
            }
            
            .table-header {
                display: none;
            }
            
            .table-row {
                padding: 16px;
                border: 1px solid #334155;
                border-radius: 8px;
                margin-bottom: 8px;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="loading">Loading BNA Operations...</div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations()
                .then((registrations) => registrations.forEach((registration) => registration.unregister()))
                .catch(() => {});
        }

        // API Client
        const api = {
            async request(method, path, body) {
                const options = {
                    method,
                    credentials: 'same-origin',
                    headers: { 
                        'Content-Type': 'application/json' 
                    }
                };
                if (body) options.body = JSON.stringify(body);
                
                const response = await fetch('/api/bna' + path, options);
                if (response.status === 401) {
                    localStorage.removeItem('bna_ops_session');
                    window.location.href = '/operations-login.html';
                    return null;
                }
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || `Request failed: ${response.status}`);
                }
                return data;
            },
            
            getTasks(filters = {}) {
                const params = new URLSearchParams();
                if (filters.stage) params.set('stage', filters.stage);
                if (filters.category) params.set('category', filters.category);
                if (filters.urgency) params.set('urgency', filters.urgency);
                return this.request('GET', '/tasks?' + params.toString());
            },
            
            createTask(task) { return this.request('POST', '/tasks', task); },
            createFromRamble(ramble) { return this.request('POST', '/tasks', { ramble, source: 'web', created_by: 'operator' }); },
            updateTask(id, task) { return this.request('PATCH', '/tasks/' + id, task); },
            moveTask(id, stage) { return this.request('PATCH', '/tasks/' + id, { stage }); },
            deleteTask(id) { return this.request('DELETE', '/tasks/' + id); },
            
            getSignups(filters = {}) {
                const params = new URLSearchParams();
                if (filters.status) params.set('status', filters.status);
                if (filters.payment_status) params.set('payment_status', filters.payment_status);
                return this.request('GET', '/signups?' + params.toString());
            },
            
            createSignup(signup) { return this.request('POST', '/signups', signup); },
            updateSignup(id, updates) { return this.request('PATCH', '/signups/' + id, updates); },
            
            getPayments(filters = {}) {
                const params = new URLSearchParams();
                if (filters.signup_id) params.set('signup_id', filters.signup_id);
                return this.request('GET', '/payments?' + params.toString());
            },
            
            createPayment(payment) { return this.request('POST', '/payments', payment); },

            getPaymentIntake(filters = {}) {
                const params = new URLSearchParams();
                if (filters.status) params.set('status', filters.status);
                return this.request('GET', '/payment-intake?' + params.toString());
            },
            createPaymentIntake(intake) { return this.request('POST', '/payment-intake', intake); },
            updatePaymentIntake(id, intake) { return this.request('PATCH', '/payment-intake/' + id, intake); },

            getContentJobs(filters = {}) {
                const params = new URLSearchParams();
                if (filters.status) params.set('status', filters.status);
                return this.request('GET', '/content-jobs?' + params.toString());
            },
            createContentJob(job) { return this.request('POST', '/content-jobs', job); },
            updateContentJob(id, job) { return this.request('PATCH', '/content-jobs/' + id, job); },
            updateContentOutput(id, output) { return this.request('PATCH', '/content-outputs/' + id, output); },

            getStudents() { return this.request('GET', '/students'); },
            getAccountability(filters = {}) {
                const params = new URLSearchParams();
                if (filters.event_type) params.set('event_type', filters.event_type);
                if (filters.student_id) params.set('student_id', filters.student_id);
                return this.request('GET', '/accountability?' + params.toString());
            },
            createAccountability(event) { return this.request('POST', '/accountability', event); },
            deleteAccountability(id) { return this.request('DELETE', '/accountability/' + id); }
        };

        // State
        let tasks = [];
        let signups = [];
        let payments = [];
        let paymentIntake = [];
        let contentJobs = [];
        let students = [];
        let accountabilityEvents = [];
        const initialView = new URLSearchParams(window.location.search).get('view');
        let currentView = ['pipeline', 'signups', 'billing', 'content', 'accountability', 'ramble'].includes(initialView) ? initialView : 'pipeline';
        let editingTask = null;
        
        // Config
        const PIPELINE_STAGES = [
            { id: 'inbox', label: 'Inbox', emoji: '📥' },
            { id: 'clarify', label: 'Clarify', emoji: '❓' },
            { id: 'plan', label: 'Plan', emoji: '📋' },
            { id: 'execute', label: 'Execute', emoji: '⚡' },
            { id: 'review', label: 'Review', emoji: '👀' },
            { id: 'complete', label: 'Complete', emoji: '✅' },
            { id: 'archive', label: 'Archive', emoji: '📦' }
        ];
        
        const CATEGORIES = [
            { id: 'admin', label: 'Admin', color: '#7c3aed' },
            { id: 'marketing', label: 'Marketing', color: '#2563eb' },
            { id: 'parent_coaching', label: 'Parent Coaching', color: '#059669' },
            { id: 'student_operations', label: 'Student Ops', color: '#d97706' },
            { id: 'finance', label: 'Finance', color: '#dc2626' },
            { id: 'legal', label: 'Legal', color: '#7c2d12' },
            { id: 'communications', label: 'Comms', color: '#0891b2' },
            { id: 'operations', label: 'Operations', color: '#475569' },
            { id: 'accountability', label: 'Accountability', color: '#c9a227' }
        ];

        // Render functions
        function renderHeader() {
            return `
                <header class="header">
                    <div class="header-content">
                        <div>
                            <h1>BNA Operations</h1>
                            <p>Task pipeline, signups, billing, and rambles</p>
                        </div>
                        <div class="header-actions">
                            <button class="btn btn-primary" onclick="openTaskModal()">
                                <span>+</span> New Task
                            </button>
                            <button class="btn btn-secondary" onclick="openSignupModal()">
                                <span>+</span> New Signup
                            </button>
                        </div>
                    </div>
                </header>
                
                <nav class="nav-tabs">
                    <div class="nav-tabs-content">
                        <button class="nav-tab ${currentView === 'pipeline' ? 'active' : ''}" onclick="switchView('pipeline')">
                            📊 Pipeline
                        </button>
                        <button class="nav-tab ${currentView === 'signups' ? 'active' : ''}" onclick="switchView('signups')">
                            👨‍👩‍👧‍👦 Signups
                        </button>
                        <button class="nav-tab ${currentView === 'billing' ? 'active' : ''}" onclick="switchView('billing')">
                            💰 Billing
                        </button>
                        <button class="nav-tab ${currentView === 'content' ? 'active' : ''}" onclick="switchView('content')">
                            Content
                        </button>
                        <button class="nav-tab ${currentView === 'accountability' ? 'active' : ''}" onclick="switchView('accountability')">
                            Accountability
                        </button>
                        <button class="nav-tab ${currentView === 'ramble' ? 'active' : ''}" onclick="switchView('ramble')">
                            🎤 Ramble
                        </button>
                    </div>
                </nav>
            `;
        }

        function renderPipeline() {
            const tasksByStage = {};
            PIPELINE_STAGES.forEach(s => tasksByStage[s.id] = []);
            tasks.forEach(t => {
                if (tasksByStage[t.stage]) tasksByStage[t.stage].push(t);
            });
            
            return `
                <div class="container">
                    <div class="pipeline-board">
                        ${PIPELINE_STAGES.map(stage => `
                            <div class="pipeline-column" data-stage="${stage.id}">
                                <div class="column-header">
                                    <div class="column-title">
                                        <span>${stage.emoji}</span>
                                        ${stage.label}
                                    </div>
                                    <span class="column-count">${tasksByStage[stage.id].length}</span>
                                </div>
                                <div class="column-content" ondrop="dropTask(event, '${stage.id}')" ondragover="allowDrop(event)">
                                    ${tasksByStage[stage.id].map(task => renderTaskCard(task)).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderTaskCard(task) {
            const category = CATEGORIES.find(c => c.id === task.category) || CATEGORIES[7];
            
            return `
                <div class="task-card" draggable="true" ondragstart="dragTask(event, '${task.id}')" onclick="editTask('${task.id}')">
                    <div class="task-title">${escapeHtml(task.title)}</div>
                    <div class="task-meta">
                        <span class="badge badge-category-${task.category}">${category.label}</span>
                        <span class="badge badge-urgency-${task.urgency}">${task.urgency.replace('_', ' ')}</span>
                        ${task.energy_required ? `<span class="badge badge-energy-${task.energy_required}">${task.energy_required}</span>` : ''}
                    </div>

        // Helpers
        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
        
        function formatDate(date) {
            if (!date) return '';
            return new Date(date).toLocaleDateString('en-GB', { month: 'short', day: 'numeric' });
        }

        function formatEventType(type) {
            return String(type || '').replace(/_/g, ' ');
        }

        // Actions
        async function loadData() {
            try {
                const [tasksRes, signupsRes, paymentsRes, paymentIntakeRes, contentJobsRes, studentsRes, accountabilityRes] = await Promise.allSettled([
                    api.getTasks(),
                    api.getSignups(),
                    api.getPayments(),
                    api.getPaymentIntake(),
                    api.getContentJobs(),
                    api.getStudents(),
                    api.getAccountability()
                ]);

                if (tasksRes.status === 'fulfilled' && tasksRes.value?.tasks) tasks = tasksRes.value.tasks;
                if (signupsRes.status === 'fulfilled' && signupsRes.value?.signups) signups = signupsRes.value.signups;
                if (paymentsRes.status === 'fulfilled' && paymentsRes.value?.payments) payments = paymentsRes.value.payments;
                if (paymentIntakeRes.status === 'fulfilled' && paymentIntakeRes.value?.intake) paymentIntake = paymentIntakeRes.value.intake;
                if (contentJobsRes.status === 'fulfilled' && contentJobsRes.value?.jobs) contentJobs = contentJobsRes.value.jobs;
                if (studentsRes.status === 'fulfilled' && studentsRes.value?.students) students = studentsRes.value.students;
                if (accountabilityRes.status === 'fulfilled' && accountabilityRes.value?.events) accountabilityEvents = accountabilityRes.value.events;

                const errors = [tasksRes, signupsRes, paymentsRes, paymentIntakeRes, contentJobsRes, studentsRes, accountabilityRes]
                    .filter((result) => result.status === 'rejected')
                    .map((result) => result.reason?.message || 'Unknown dashboard error');

                render(errors);
            } catch (error) {
                render([error.message || 'Unable to load dashboard data']);
            }
        }

        function render(errors = []) {
            const app = document.getElementById('app');
            let content = '';
            
            switch (currentView) {
                case 'pipeline': content = renderPipeline(); break;
                case 'signups': content = renderSignups(); break;
                case 'billing': content = renderBilling(); break;
                case 'content': content = renderContent(); break;
                case 'accountability': content = renderAccountability(); break;
                case 'ramble': content = renderRamble(); break;
                default: content = renderPipeline(); break;
            }
            
            const errorBanner = errors.length
                ? `<div class="container"><div class="error-banner">Some dashboard data could not load: ${errors.map(escapeHtml).join('; ')}</div></div>`
                : '';

            app.innerHTML = renderHeader() + errorBanner + content + renderTaskModal();
        }

        function switchView(view) {
            currentView = view;
            const url = new URL(window.location.href);
            url.searchParams.set('view', view);
            window.history.replaceState({}, '', url);
            render();
        }

        // Task Actions
        function openTaskModal() {
            editingTask = null;
            render();
            document.getElementById('taskModal').classList.add('show');
        }

        function closeTaskModal() {
            document.getElementById('taskModal').classList.remove('show');
            editingTask = null;
        }

        function editTask(id) {
            editingTask = tasks.find(t => t.id === id);
            render();
            document.getElementById('taskModal').classList.add('show');
        }

        async function saveTask() {
            const data = {
                title: document.getElementById('taskTitle').value,
                notes: document.getElementById('taskNotes').value,
                stage: document.getElementById('taskStage').value,
                category: document.getElementById('taskCategory').value,
                urgency: document.getElementById('taskUrgency').value,
                energy_required: document.getElementById('taskEnergy').value || null,
                due_date: document.getElementById('taskDueDate').value || null,
                estimated_minutes: parseInt(document.getElementById('taskMinutes').value) || null
            };
            
            if (!data.title) return alert('Title required');
            
            if (editingTask) {
                await api.updateTask(editingTask.id, data);
            } else {
                await api.createTask(data);
            }
            
            closeTaskModal();
            loadData();
        }

        // Drag & Drop
        function dragTask(ev, taskId) {
            ev.dataTransfer.setData('taskId', taskId);
            ev.target.classList.add('dragging');
        }

        function allowDrop(ev) {
            ev.preventDefault();
        }

        async function dropTask(ev, stage) {
            ev.preventDefault();
            const taskId = ev.dataTransfer.getData('taskId');
            document.querySelector('.dragging')?.classList.remove('dragging');
            
            await api.moveTask(taskId, stage);
            loadData();
        }

        // Ramble
        async function processRamble() {
            const text = document.getElementById('rambleInput').value;
            if (!text.trim()) return;
            
            const res = await api.createFromRamble(text);
            if (res?.success) {
                alert(`Created ${res.tasks_created} task(s) from your ramble!`);
                document.getElementById('rambleInput').value = '';
                loadData();
            }
        }

        async function openAccountabilityPrompt() {
            const title = prompt('What should be tracked?');
            if (!title) return;

            const eventType = prompt('Type: class_session, learning_note, question, student_goal, private_meeting, or decision', 'learning_note') || 'learning_note';
            const studentName = prompt('Student name, if this belongs to one student:', '') || '';
            const topic = prompt('Topic, if any:', '') || '';
            const notes = prompt('Notes:', '') || '';
            const student = students.find(s => studentName && s.name.toLowerCase() === studentName.toLowerCase());

            await api.createAccountability({
                event_type: eventType,
                student_id: student?.id || null,
                student_name: studentName || null,
                title,
                topic: topic || null,
                notes: notes || null,
                question_text: eventType === 'question' ? title : null,
                source: 'manual'
            });

            await loadData();
            switchView('accountability');
        }

        function openSignupModal() {
            alert('Signup form - implement as needed');
        }

        }

        // Payment Actions
        function logPayment(signupId) {
            const amount = prompt('Payment amount (ILS):', '500');
            if (!amount) return;
            
            const method = confirm('Payment method: OK = Cash, Cancel = Credit') ? 'cash' : 'green_invoice';
            
            api.createPayment({
                signup_id: signupId,
                amount: parseFloat(amount),
                method: method,
                payment_type: 'registration',
                status: 'completed',
                received_by: 'operator',
                notes: 'Logged via dashboard'
            }).then(() => loadData());
        }

        function logPaymentIntake() {
            const parentName = prompt('Parent name:');
            if (!parentName) return;

            const amount = prompt('Amount paid (ILS):', '500');
            const method = confirm('Payment method: OK = Cash, Cancel = Credit') ? 'cash' : 'green_invoice';
            const studentName = prompt('Student name, if you know it:', '') || '';
            const phone = prompt('Parent phone, if you know it:', '') || '';
            const email = prompt('Parent email, if you know it:', '') || '';
            const notes = prompt('Notes:', 'Paid before signup form was completed') || '';

            api.createPaymentIntake({
                parent_name: parentName,
                parent_phone: phone || null,
                parent_email: email || null,
                student_name: studentName || null,
                amount: amount ? parseFloat(amount) : null,
                method,
                status: 'needs_signup',
                source: 'manual',
                notes
            }).then(() => loadData());
        }

        function markIntakeDone(id) {
            api.updatePaymentIntake(id, { status: 'completed' }).then(() => loadData());
        }

        function createManualContentJob() {
            const title = prompt('Content job title:', 'New parent update video');
            if (!title) return;
            const caption = prompt('Notes or intended outputs:', 'Repurpose for WhatsApp, Facebook, YouTube, Google Business Profile, blog/newsletter') || '';

            api.createContentJob({
                title,
                source_type: 'manual',
                caption,
                status: 'ingested',
                notes: caption
            }).then(() => loadData());
        }

        function markContentJob(id, status) {
            api.updateContentJob(id, { status }).then(() => loadData());
        }

        function markContentOutput(id, status) {
            api.updateContentOutput(id, { status }).then(() => loadData());
        }

        // Init
        loadData();
        setInterval(loadData, 30000); // Refresh every 30s
    </script>
</body>
</html>
