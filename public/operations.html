<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BNA Operations</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1A1A1A">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #FAF6EE;
            color: #1A1A1A;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* Scrollbar hide utility */
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        /* Line clamp */
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Types
        const CATEGORIES = ['Accounting', 'Marketing', 'Communications'];
        const URGENCIES = ['Urgent', 'Today', 'This week', 'Low priority'];
        const STATUSES = ['Pending', 'In progress', 'Waiting on someone', 'Done'];

        // API helper
        const api = {
            async request(method, path, body) {
                const sessionId = localStorage.getItem('bna_ops_session');
                const options = {
                    method,
                    headers: {
                        'Authorization': 'Bearer ' + sessionId,
                        'Content-Type': 'application/json'
                    }
                };
                if (body) options.body = JSON.stringify(body);
                
                const response = await fetch('/api/operations' + path, options);
                
                if (response.status === 401) {
                    localStorage.removeItem('bna_ops_session');
                    window.location.href = '/operations/login';
                    return null;
                }
                
                return response.json();
            },
            getTasks() { return this.request('GET', '/tasks'); },
            createTask(task) { return this.request('POST', '/tasks', task); },
            updateTask(id, task) { return this.request('PUT', '/tasks/' + id, task); },
            deleteTask(id) { return this.request('DELETE', '/tasks/' + id); }
        };

        // Summary Cards Component
        function SummaryCards({ tasks }) {
            const pendingCount = tasks.filter(t => t.status === 'Pending').length;
            const urgentCount = tasks.filter(t => t.urgency === 'Urgent' && t.status !== 'Done').length;
            const dueTodayCount = tasks.filter(t => {
                if (t.status === 'Done') return false;
                const today = new Date().toISOString().split('T')[0];
                return t.dueDate === today || t.urgency === 'Today';
            }).length;
            const doneCount = tasks.filter(t => t.status === 'Done').length;

            const cards = [
                { label: 'Pending', count: pendingCount, color: 'bg-amber-100 text-amber-800 border-amber-200' },
                { label: 'Urgent', count: urgentCount, color: 'bg-rose-100 text-rose-800 border-rose-200' },
                { label: 'Due Today', count: dueTodayCount, color: 'bg-blue-100 text-blue-800 border-blue-200' },
                { label: 'Done', count: doneCount, color: 'bg-emerald-100 text-emerald-800 border-emerald-200' },
            ];

            return (
                <div className="grid grid-cols-4 gap-2 mb-4">
                    {cards.map(card => (
                        <div key={card.label} className={`rounded-xl border p-2 text-center ${card.color}`}>
                            <div className="text-xl font-bold">{card.count}</div>
                            <div className="text-[10px] font-medium uppercase tracking-wide mt-0.5">{card.label}</div>
                        </div>
                    ))}
                </div>
            );
        }

        // Task Filters Component
        function TaskFilters({ filters, onChange }) {
            const updateFilter = (key, value) => onChange({ ...filters, [key]: value });
            const categoryTabs = ['All', ...CATEGORIES];

            return (
                <div className="space-y-3 mb-4">
                    <div className="flex gap-1 overflow-x-auto pb-1 scrollbar-hide -mx-4 px-4">
                        {categoryTabs.map(cat => (
                            <button
                                key={cat}
                                onClick={() => updateFilter('category', cat)}
                                className={`flex-shrink-0 px-3 py-2 rounded-lg text-sm font-medium transition-colors whitespace-nowrap ${
                                    filters.category === cat ? 'bg-gray-900 text-white' : 'bg-white border border-gray-200 text-gray-600'
                                }`}
                            >
                                {cat}
                            </button>
                        ))}
                    </div>

                    <div className="relative">
                        <input
                            type="text"
                            placeholder="Search tasks..."
                            value={filters.search}
                            onChange={e => updateFilter('search', e.target.value)}
                            className="w-full px-4 py-2.5 pl-10 bg-white border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-yellow-500"
                        />
                        <svg className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </div>

                    <div className="flex gap-2">
                        <select
                            value={filters.urgency}
                            onChange={e => updateFilter('urgency', e.target.value)}
                            className="flex-1 px-3 py-2 bg-white border border-gray-200 rounded-lg text-sm"
                        >
                            <option>All urgency</option>
                            {URGENCIES.map(u => <option key={u}>{u}</option>)}
                        </select>
                        <select
                            value={filters.status}
                            onChange={e => updateFilter('status', e.target.value)}
                            className="flex-1 px-3 py-2 bg-white border border-gray-200 rounded-lg text-sm"
                        >
                            <option>All statuses</option>
                            {STATUSES.map(s => <option key={s}>{s}</option>)}
                        </select>
                    </div>
                </div>
            );
        }

        // Task Card Component
        function TaskCard({ task, onEdit, onDelete, onToggleDone }) {
            const isDone = task.status === 'Done';

            const categoryColors = {
                Accounting: 'bg-purple-100 text-purple-800 border-purple-200',
                Marketing: 'bg-blue-100 text-blue-800 border-blue-200',
                Communications: 'bg-teal-100 text-teal-800 border-teal-200',
            };

            const urgencyColors = {
                Urgent: 'bg-rose-100 text-rose-800 border-rose-200',
                Today: 'bg-amber-100 text-amber-800 border-amber-200',
                'This week': 'bg-blue-100 text-blue-800 border-blue-200',
                'Low priority': 'bg-gray-100 text-gray-600 border-gray-200',
            };

            const statusColors = {
                Pending: 'bg-amber-100 text-amber-800 border-amber-200',
                'In progress': 'bg-blue-100 text-blue-800 border-blue-200',
                'Waiting on someone': 'bg-purple-100 text-purple-800 border-purple-200',
                Done: 'bg-emerald-100 text-emerald-800 border-emerald-200',
            };

            const formatDate = dateStr => {
                if (!dateStr) return null;
                return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            };

            return (
                <div className={`bg-white border border-gray-200 rounded-xl p-4 ${isDone ? 'opacity-60' : ''}`}>
                    <div className="flex items-start justify-between gap-3">
                        <div className="flex-1 min-w-0">
                            <h3 className={`font-semibold text-gray-900 mb-1 ${isDone ? 'line-through' : ''}`}>{task.title}</h3>
                            {task.notes && <p className="text-sm text-gray-500 line-clamp-2 mb-2">{task.notes}</p>}
                            
                            <div className="flex flex-wrap gap-1.5 mb-2">
                                <span className={`inline-flex items-center px-2 py-0.5 rounded text-xs font-medium border ${categoryColors[task.category]}`}>{task.category}</span>
                                <span className={`inline-flex items-center px-2 py-0.5 rounded text-xs font-medium border ${urgencyColors[task.urgency]}`}>{task.urgency}</span>
                                <span className={`inline-flex items-center px-2 py-0.5 rounded text-xs font-medium border ${statusColors[task.status]}`}>{task.status}</span>
                            </div>

                            <div className="flex flex-wrap items-center gap-3 text-xs text-gray-500">
                                {task.dueDate && (
                                    <span className="flex items-center gap-1">
                                        <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                        </svg>
                                        {formatDate(task.dueDate)}
                                    </span>
                                )}
                                {task.owner && (
                                    <span className="flex items-center gap-1">
                                        <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                                        </svg>
                                        {task.owner}
                                    </span>
                                )}
                            </div>
                        </div>

                        <div className="flex items-center gap-1 flex-shrink-0">
                            <button onClick={() => onToggleDone(task)} className={`p-2 rounded-lg ${isDone ? 'bg-amber-100 text-amber-700' : 'bg-emerald-100 text-emerald-700'}`}>
                                {isDone ? (
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                                    </svg>
                                ) : (
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" />
                                    </svg>
                                )}
                            </button>
                            <button onClick={() => onEdit(task)} className="p-2 rounded-lg bg-gray-100 text-gray-700">
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                                </svg>
                            </button>
                            <button onClick={() => onDelete(task.id)} className="p-2 rounded-lg bg-rose-100 text-rose-700">
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // Task Form Modal
        function TaskFormModal({ task, isOpen, onClose, onSave }) {
            const [formData, setFormData] = useState({
                title: '', notes: '', category: 'Accounting', urgency: 'This week', status: 'Pending', dueDate: '', owner: ''
            });

            useEffect(() => {
                if (task) {
                    setFormData({
                        title: task.title,
                        notes: task.notes || '',
                        category: task.category,
                        urgency: task.urgency,
                        status: task.status,
                        dueDate: task.dueDate || '',
                        owner: task.owner || ''
                    });
                } else {
                    setFormData({ title: '', notes: '', category: 'Accounting', urgency: 'This week', status: 'Pending', dueDate: '', owner: '' });
                }
            }, [task, isOpen]);

            const handleSubmit = e => {
                e.preventDefault();
                onSave({
                    ...formData,
                    dueDate: formData.dueDate || null,
                    owner: formData.owner || null
                });
                onClose();
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50">
                    <div className="bg-white rounded-2xl border border-gray-200 w-full max-w-md max-h-[90vh] overflow-y-auto">
                        <div className="p-4 border-b border-gray-200">
                            <h2 className="text-lg font-semibold">{task ? 'Edit Task' : 'Add New Task'}</h2>
                        </div>
                        <form onSubmit={handleSubmit} className="p-4 space-y-4">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">Title *</label>
                                <input
                                    type="text"
                                    required
                                    value={formData.title}
                                    onChange={e => setFormData({...formData, title: e.target.value})}
                                    className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-yellow-500"
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">Notes</label>
                                <textarea
                                    rows={3}
                                    value={formData.notes}
                                    onChange={e => setFormData({...formData, notes: e.target.value})}
                                    className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-yellow-500 resize-none"
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">Category *</label>
                                <div className="grid grid-cols-3 gap-2">
                                    {CATEGORIES.map(cat => (
                                        <button
                                            key={cat}
                                            type="button"
                                            onClick={() => setFormData({...formData, category: cat})}
                                            className={`px-3 py-2 rounded-lg text-sm font-medium ${formData.category === cat ? 'bg-gray-900 text-white' : 'bg-gray-50 border border-gray-200'}`}
                                        >
                                            {cat}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">Urgency *</label>
                                <div className="grid grid-cols-2 gap-2">
                                    {URGENCIES.map(urg => (
                                        <button
                                            key={urg}
                                            type="button"
                                            onClick={() => setFormData({...formData, urgency: urg})}
                                            className={`px-3 py-2 rounded-lg text-sm font-medium ${formData.urgency === urg ? 'bg-gray-900 text-white' : 'bg-gray-50 border border-gray-200'}`}
                                        >
                                            {urg}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">Status *</label>
                                <select
                                    value={formData.status}
                                    onChange={e => setFormData({...formData, status: e.target.value})}
                                    className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm"
                                >
                                    {STATUSES.map(s => <option key={s}>{s}</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">Due Date (optional)</label>
                                <input
                                    type="date"
                                    value={formData.dueDate}
                                    onChange={e => setFormData({...formData, dueDate: e.target.value})}
                                    className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm"
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">Owner (optional)</label>
                                <input
                                    type="text"
                                    value={formData.owner}
                                    onChange={e => setFormData({...formData, owner: e.target.value})}
                                    className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm"
                                    placeholder="Who is responsible?"
                                />
                            </div>
                            <div className="flex gap-3 pt-2">
                                <button type="button" onClick={onClose} className="flex-1 px-4 py-2.5 bg-gray-100 rounded-lg text-sm font-medium">Cancel</button>
                                <button type="submit" className="flex-1 px-4 py-2.5 bg-gray-900 text-white rounded-lg text-sm font-medium">{task ? 'Save Changes' : 'Add Task'}</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        // Main App
        function TaskApp() {
            const [tasks, setTasks] = useState([]);
            const [isLoaded, setIsLoaded] = useState(false);
            const [filters, setFilters] = useState({ category: 'All', urgency: 'All urgency', status: 'All statuses', search: '' });
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingTask, setEditingTask] = useState(null);

            useEffect(() => {
                loadTasks();
            }, []);

            const loadTasks = async () => {
                const data = await api.getTasks();
                if (data && data.success) {
                    setTasks(data.tasks);
                }
                setIsLoaded(true);
            };

            const filteredTasks = useMemo(() => {
                return tasks.filter(task => {
                    if (filters.category !== 'All' && task.category !== filters.category) return false;
                    if (filters.urgency !== 'All urgency' && task.urgency !== filters.urgency) return false;
                    if (filters.status !== 'All statuses' && task.status !== filters.status) return false;
                    if (filters.search) {
                        const search = filters.search.toLowerCase();
                        return task.title.toLowerCase().includes(search) || (task.notes && task.notes.toLowerCase().includes(search));
                    }
                    return true;
                });
            }, [tasks, filters]);

            const sortedTasks = useMemo(() => {
                const urgencyOrder = { Urgent: 0, Today: 1, 'This week': 2, 'Low priority': 3 };
                return [...filteredTasks].sort((a, b) => {
                    if (a.status === 'Done' && b.status !== 'Done') return 1;
                    if (a.status !== 'Done' && b.status === 'Done') return -1;
                    const diff = urgencyOrder[a.urgency] - urgencyOrder[b.urgency];
                    if (diff !== 0) return diff;
                    if (a.dueDate && b.dueDate) return a.dueDate.localeCompare(b.dueDate);
                    if (a.dueDate) return -1;
                    if (b.dueDate) return 1;
                    return 0;
                });
            }, [filteredTasks]);

            const handleAddTask = async taskData => {
                const data = await api.createTask(taskData);
                if (data && data.success) {
                    loadTasks();
                }
            };

            const handleEditTask = async taskData => {
                if (editingTask) {
                    const data = await api.updateTask(editingTask.id, taskData);
                    if (data && data.success) {
                        loadTasks();
                    }
                }
            };

            const handleDeleteTask = async id => {
                if (confirm('Are you sure you want to delete this task?')) {
                    const data = await api.deleteTask(id);
                    if (data && data.success) {
                        loadTasks();
                    }
                }
            };

            const handleToggleDone = async task => {
                const newStatus = task.status === 'Done' ? 'Pending' : 'Done';
                const data = await api.updateTask(task.id, { ...task, status: newStatus });
                if (data && data.success) {
                    loadTasks();
                }
            };

            const handleLogout = async () => {
                const sessionId = localStorage.getItem('bna_ops_session');
                await fetch('/api/operations/logout', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + sessionId }
                });
                localStorage.removeItem('bna_ops_session');
                window.location.href = '/operations/login';
            };

            if (!isLoaded) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="text-gray-500">Loading...</div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-[#FAF6EE]">
                    <header className="sticky top-0 z-30 bg-white/95 backdrop-blur-sm border-b border-gray-200">
                        <div className="max-w-3xl mx-auto px-4 py-3">
                            <div className="flex items-center justify-between">
                                <div>
                                    <h1 className="text-xl font-bold text-gray-900">BNA Operations</h1>
                                    <p className="text-xs text-gray-500">Simple task control for the academy</p>
                                </div>
                                <div className="flex items-center gap-2">
                                    <button onClick={() => { setEditingTask(null); setIsModalOpen(true); }} className="flex items-center gap-1.5 px-4 py-2 bg-gray-900 text-white rounded-lg text-sm font-medium">
                                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" />
                                        </svg>
                                        Add Task
                                    </button>
                                    <button onClick={handleLogout} className="p-2 text-gray-500 hover:text-gray-700" title="Logout">
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-3xl mx-auto px-4 py-4">
                        <SummaryCards tasks={tasks} />
                        <TaskFilters filters={filters} onChange={setFilters} />

                        <div className="flex items-center justify-between mb-3">
                            <span className="text-sm text-gray-500">{sortedTasks.length} task{sortedTasks.length !== 1 ? 's' : ''}</span>
                            {(filters.category !== 'All' || filters.urgency !== 'All urgency' || filters.status !== 'All statuses' || filters.search) && (
                                <button onClick={() => setFilters({ category: 'All', urgency: 'All urgency', status: 'All statuses', search: '' })} className="text-sm text-yellow-600 hover:underline">Clear filters</button>
                            )}
                        </div>

                        <div className="space-y-3">
                            {sortedTasks.length === 0 ? (
                                <div className="text-center py-12">
                                    <div className="w-16 h-16 mx-auto mb-4 rounded-full bg-yellow-100 flex items-center justify-center">
                                        <svg className="w-8 h-8 text-yellow-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                                        </svg>
                                    </div>
                                    <p className="text-gray-500 mb-2">No tasks found</p>
                                    <button onClick={() => { setEditingTask(null); setIsModalOpen(true); }} className="text-yellow-600 hover:underline text-sm">Add your first task</button>
                                </div>
                            ) : (
                                sortedTasks.map(task => (
                                    <TaskCard
                                        key={task.id}
                                        task={task}
                                        onEdit={task => { setEditingTask(task); setIsModalOpen(true); }}
                                        onDelete={handleDeleteTask}
                                        onToggleDone={handleToggleDone}
                                    />
                                ))
                            )}
                        </div>
                    </main>

                    <TaskFormModal
                        task={editingTask}
                        isOpen={isModalOpen}
                        onClose={() => { setIsModalOpen(false); setEditingTask(null); }}
                        onSave={editingTask ? handleEditTask : handleAddTask}
                    />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TaskApp />);
    </script>
</body>
</html>
